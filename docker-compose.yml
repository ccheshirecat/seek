services:

  wreq-relay:
    build:
      context: ./wreq-relay
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - search_net

  searxng:
    build:
      context: ./searxng-fork
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "47821:8080"   # Exposed for MCP server (host) and browser debugging
    volumes:
      # Mount proxies.txt at runtime so you can update it without rebuilding.
      # Remove the mount (or leave proxies.txt empty) to run without proxies.
      - ./proxies.txt:/etc/searxng/proxies.txt:ro
    environment:
      - SEARXNG_BASE_URL=http://localhost:47821/
      - SEARXNG_PORT=8080
    networks:
      - search_net
    depends_on:
      - wreq-relay

  # The MCP server communicates via stdio when spawned by an AI agent.
  # To use it that way, build the image then configure your agent to run:
  #   docker run -i --rm --network seek_search_net seek-mcp-server
  #
  # If you prefer SSE transport, uncomment the ports block below and switch
  # to SSEServerTransport in src/index.ts.
  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "47822:3001"
    environment:
      - SEARXNG_URL=http://searxng:8080
      - MCP_TRANSPORT=http      # switch to "stdio" if running via docker exec -i
      - MCP_PORT=3001
    networks:
      - search_net
    depends_on:
      - searxng
    stdin_open: true

networks:
  search_net:
    driver: bridge
